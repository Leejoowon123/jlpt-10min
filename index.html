<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#0f172a" />
<title>JLPT 10분 학습</title>
<script>
// 첫 페인트 전 테마 적용 — 라이트 사용자 다크 플래시 방지. (theme.js 가 이후 동적 전환 담당)
try {
  var _s = JSON.parse(localStorage.getItem('jlpt10min:v1') || '{}');
  var _m = (_s.settings && _s.settings.themeMode) || 'system';
  var _dark = _m === 'dark' ||
    (_m !== 'light' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.dataset.theme = _dark ? 'dark' : 'light';
} catch (e) { document.documentElement.dataset.theme = 'dark'; }
</script>
<link rel="stylesheet" href="./styles.css" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./assets/icons/icon-192.png" />
</head>
<body>
  <div id="app" class="app">
    <header class="top-bar">
      <button class="back-btn" id="backBtn" hidden aria-label="뒤로">←</button>
      <h1 class="brand" id="topTitle">JLPT 10분</h1>
      <div class="level-pill" id="levelPill" title="목표 레벨 변경"></div>
      <button class="gear-btn" id="settingsBtn" aria-label="설정" title="설정"
              style="background:transparent;border:0;font-size:18px;cursor:pointer;padding:4px 8px">⚙</button>
    </header>

    <main id="screen" class="screen" aria-live="polite"></main>

    <nav class="tab-bar" id="tabBar">
      <button data-route="home"    class="tab">홈</button>
      <button data-route="study"   class="tab">학습</button>
      <button data-route="review"  class="tab">복습</button>
      <button data-route="stories" class="tab">이야기</button>
      <button data-route="novels"  class="tab">단편 소설</button>
    </nav>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
