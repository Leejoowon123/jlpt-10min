name: Android APK (debug)

# Android Studio 없이 GitHub Actions 서버에서 Capacitor debug APK 를 빌드한다.
# ubuntu-latest 러너에는 Android SDK 가 사전 설치되어 있어 별도 SDK 설치 없이 동작한다.
#
# 실행: 저장소 Actions 탭 → "Android APK (debug)" → Run workflow (수동, workflow_dispatch).
# 결과: 완료 후 해당 run 의 Artifacts 에서 jlpt10m-debug-apk 다운로드 → 폰에 설치.
#
# ⚠ debug APK 는 디버그 키로 서명된 테스트용 — 공개/Play 배포용 아님(release 는 별도 서명 키 필요).

on:
  workflow_dispatch:
    inputs:
      ref:
        description: '빌드할 브랜치/ref (기본: 현재)'
        required: false
        default: ''

concurrency:
  group: apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ubuntu-latest 에 Android SDK 가 사전 설치됨 — 경로를 명시적으로 export.
      - name: Verify Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls "${ANDROID_SDK_ROOT:-$ANDROID_HOME}" || true

      # Capacitor(optionalDependencies) 포함 전체 설치.
      - name: Install dependencies (incl. Capacitor)
        run: npm install --no-audit --no-fund

      - name: Build webDir (www)
        run: node tools/build-www.mjs

      # android/ 가 커밋돼 있으면(Option A) 그대로 사용, 없으면 생성(Option B).
      - name: Add Android platform (if missing)
        run: |
          if [ ! -d android ]; then
            echo "android/ 없음 → npx cap add android"
            npx cap add android
          else
            echo "android/ 존재 → 기존 프로젝트 사용"
          fi

      - name: Capacitor sync
        run: npx cap sync android

      # 진단 — 네이티브 TTS 플러그인 설치/등록 확인(음성 안 날 때 로그에서 점검).
      # npm ls/cap ls 는 "설치/감지" 만 보여준다. 실제 APK 에 컴파일되려면 cap sync 가
      # android 프로젝트에 등록해야 하므로, 동기화 산출물(capacitor.plugins.json + gradle)을
      # 직접 출력해 "이 빌드의 APK 에 TextToSpeech 가 들어갔는지" 를 로그에서 확정한다.
      - name: Diagnostics (plugins)
        run: |
          echo "== npm ls @capacitor-community/text-to-speech =="
          npm ls @capacitor-community/text-to-speech || true
          echo "== npx cap ls =="
          npx cap ls || true
          echo "== android 등록 플러그인 (capacitor.plugins.json) =="
          cat android/app/src/main/assets/capacitor.plugins.json || echo "capacitor.plugins.json 없음 — cap sync 가 플러그인을 등록하지 못함"
          echo "== gradle 플러그인 모듈 등록 =="
          grep -n "text-to-speech" android/capacitor.settings.gradle android/app/capacitor.build.gradle || echo "gradle 에 text-to-speech 모듈 없음 — APK 에 네이티브 TTS 가 빠짐"
          if grep -q "TextToSpeech" android/app/src/main/assets/capacitor.plugins.json 2>/dev/null; then
            echo "OK: TextToSpeech 가 android 프로젝트에 등록됨 → APK 에 포함됨"
          else
            echo "WARN: TextToSpeech 미등록 — 발음이 안 나면 이 단계가 원인"
          fi

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew || true
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          SRC=android/app/build/outputs/apk/debug/app-debug.apk
          if [ -f "$SRC" ]; then
            cp "$SRC" JLPT10M-debug.apk
          else
            echo "APK 없음: $SRC"; find android/app/build/outputs -name "*.apk" || true; exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jlpt10m-debug-apk
          path: JLPT10M-debug.apk
          if-no-files-found: error
          retention-days: 14
