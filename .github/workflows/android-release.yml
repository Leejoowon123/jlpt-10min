name: Android Release (AAB/APK)

# 서명된 release AAB(+선택 APK)를 GitHub Actions 서버에서 빌드한다.
# Google Play 내부 테스트 업로드용은 AAB 우선. 직접 설치 검증용은 release APK(선택).
#
# 실행: Actions 탭 → "Android Release (AAB/APK)" → Run workflow (수동, workflow_dispatch).
#
# ⚠ 서명 비밀값은 저장소에 두지 않는다. 아래 GitHub Secrets 가 필요하다(없으면 빌드 실패 + 안내):
#   - ANDROID_KEYSTORE_BASE64   : keystore(.jks) 를 base64 로 인코딩한 문자열
#   - ANDROID_KEYSTORE_PASSWORD : 스토어 비밀번호
#   - ANDROID_KEY_ALIAS         : 키 별칭(alias)
#   - ANDROID_KEY_PASSWORD      : 키 비밀번호
# keystore 생성/Secrets 등록/Play 내부 테스트 절차: docs/android-release.md

on:
  workflow_dispatch:
    inputs:
      ref:
        description: '빌드할 브랜치/ref (기본: 현재)'
        required: false
        default: ''
      build_apk:
        description: 'release APK 도 함께 빌드(직접 설치 테스트용)'
        type: boolean
        required: false
        default: false
      version_name:
        description: 'versionName (비우면 js/appMeta.js 의 APP_VERSION 사용)'
        required: false
        default: ''
      version_code:
        description: 'versionCode 정수 (비우면 이 워크플로 run number 사용 — 단조 증가)'
        required: false
        default: ''

concurrency:
  group: apk-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-release:
    name: Build signed release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      # 서명 Secrets 사전 점검 — 누락이면 빌드 자원 쓰기 전에 명확히 실패.
      - name: Verify signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=""
          [ -z "$ANDROID_KEYSTORE_BASE64" ] && missing="$missing ANDROID_KEYSTORE_BASE64"
          [ -z "$ANDROID_KEYSTORE_PASSWORD" ] && missing="$missing ANDROID_KEYSTORE_PASSWORD"
          [ -z "$ANDROID_KEY_ALIAS" ] && missing="$missing ANDROID_KEY_ALIAS"
          [ -z "$ANDROID_KEY_PASSWORD" ] && missing="$missing ANDROID_KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::release 서명 Secrets 누락:$missing — docs/android-release.md 의 'GitHub Secrets 등록' 절차를 따르세요."
            exit 1
          fi
          echo "서명 Secrets 4종 확인됨."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies (incl. Capacitor)
        run: npm install --no-audit --no-fund

      - name: Build webDir (www)
        run: node tools/build-www.mjs

      - name: Add Android platform (if missing)
        run: |
          if [ ! -d android ]; then
            echo "android/ 없음 → npx cap add android"
            npx cap add android
          else
            echo "android/ 존재 → 기존 프로젝트 사용"
          fi

      - name: Capacitor sync
        run: npx cap sync android

      # compileSdk/targetSdk(35+) + versionCode/versionName 주입 — Play 요구/재업로드 충돌 방지.
      # versionCode: 입력값이 없으면 이 워크플로의 run number(단조 증가)를 사용 → 매 빌드 고유.
      # versionName: 입력값이 없으면 js/appMeta.js 의 APP_VERSION.
      # Play target API 요구: https://developer.android.com/google/play/requirements/target-sdk
      - name: Configure Android (sdk + version)
        env:
          ANDROID_COMPILE_SDK: '35'
          ANDROID_TARGET_SDK: '35'
          ANDROID_VERSION_CODE: ${{ github.event.inputs.version_code || github.run_number }}
          ANDROID_VERSION_NAME: ${{ github.event.inputs.version_name }}
        run: node tools/inject-android-config.mjs

      # (라운드 66) 런처 아이콘 강제 주입 제거 — 기본(Capacitor 생성) 아이콘을 그대로 유지한다.
      #   사용자 요청으로 브랜드 아이콘 강제 주입을 사용하지 않음. 추후 브랜딩이 필요하면
      #   docs/android-release.md §3-B 의 @capacitor/assets 절차를 명시적으로 사용.

      # 진단 — 네이티브 TTS 플러그인 등록 확인(release 에도 포함되는지).
      - name: Diagnostics (plugins)
        run: |
          echo "== android 등록 플러그인 (capacitor.plugins.json) =="
          cat android/app/src/main/assets/capacitor.plugins.json || echo "capacitor.plugins.json 없음"

      # keystore 복원 + key.properties 생성(비밀값은 Secrets 에서만 주입 — 로그/파일 평문 커밋 없음).
      - name: Restore keystore & key.properties
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          cat > android/key.properties <<EOF
          storeFile=release.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
          echo "keystore + key.properties 준비 완료(파일은 러너에만 존재, 커밋 안 됨)."

      # 생성된 build.gradle 에 signingConfigs.release 주입(Option B — android/ 미커밋).
      - name: Inject signing config
        run: node tools/inject-signing.mjs

      - name: Build release AAB
        run: |
          cd android
          chmod +x ./gradlew || true
          ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Build release APK (optional)
        if: ${{ github.event.inputs.build_apk == 'true' }}
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Collect artifacts
        run: |
          echo "== 최종 버전(빌드된 build.gradle 기준) =="
          grep -E "versionCode|versionName" android/app/build.gradle || true
          grep -E "targetSdkVersion|compileSdkVersion" android/variables.gradle || true
          AAB=android/app/build/outputs/bundle/release/app-release.aab
          if [ -f "$AAB" ]; then cp "$AAB" JLPT10M-release.aab; else echo "AAB 없음: $AAB"; find android/app/build/outputs -name "*.aab" || true; exit 1; fi
          APK=android/app/build/outputs/apk/release/app-release.apk
          if [ -f "$APK" ]; then cp "$APK" JLPT10M-release.apk; echo "release APK 포함"; fi

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: jlpt10m-release-aab
          path: JLPT10M-release.aab
          if-no-files-found: error
          retention-days: 14

      - name: Upload APK artifact (optional)
        if: ${{ github.event.inputs.build_apk == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: jlpt10m-release-apk
          path: JLPT10M-release.apk
          if-no-files-found: warn
          retention-days: 14

      # 비밀 파일 정리(아티팩트 오염 방지 — 러너는 폐기되지만 명시적으로 제거).
      - name: Cleanup secrets
        if: ${{ always() }}
        run: rm -f android/app/release.keystore android/key.properties || true
